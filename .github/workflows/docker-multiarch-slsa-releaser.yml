---
name: Docker Multiarch SLSA Releaser
on:
  workflow_call:
    inputs:
      image_name:
        type: string
        required: true
      runs_on:
        type: string
        default: 'ubuntu-latest'
      build_args:
        type: string
        default: ''
      context:
        type: string
        default: '.'
      platforms:
        type: string
        default: "linux/amd64,linux/arm64"
      push:
        type: boolean
        default: true
      tag:
        type: string
        default: ${{ github.ref_name }}
      op_item_path_notification_webhook:
        type: string
        default: "op://wvraeffbmpocy5jpzwgyerj3qi/mhvxjb5ebu2hglxmzyhwjym3eq/github-actions-bot"
      op_item_path_container_registry_username:
        type: string
        default: "op://wvraeffbmpocy5jpzwgyerj3qi/hcpvtx4e3bnw4kxzeb4qpxuseq/username"
      op_item_path_container_registry_password:
        type: string
        default: "op://wvraeffbmpocy5jpzwgyerj3qi/hcpvtx4e3bnw4kxzeb4qpxuseq/password"
      op_item_path_container_registry_url:
        type: string
        default: "op://wvraeffbmpocy5jpzwgyerj3qi/hcpvtx4e3bnw4kxzeb4qpxuseq/url"
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        required: true

jobs:
  # This step builds our image, pushes it, and outputs the repo hash digest.
  build:
    permissions:
      contents: read
      packages: write
    outputs:
      image: "${{ steps.load_secret.outputs.IMAGE_REGISTRY }}/${{ inputs.image_name }}"
      image_username: ${{ steps.load_secret.outputs.IMAGE_REGISTRY_USERNAME }}
      image_password: ${{ steps.load_secret.outputs.IMAGE_REGISTRY_PASSWORD }}
      digest: ${{ steps.build.outputs.digest }}
    runs-on: ${{ inputs.runs_on }}
    steps:
      - name: Load secrets
        id: load_secret
        uses: 1password/load-secrets-action@v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          IMAGE_REGISTRY: ${{ inputs.op_item_path_container_registry_url }}
          IMAGE_REGISTRY_USERNAME: ${{ inputs.op_item_path_container_registry_username }}
          IMAGE_REGISTRY_PASSWORD: ${{ inputs.op_item_path_container_registry_password }}

      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Authenticate Docker
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ steps.load_secret.outputs.IMAGE_REGISTRY }}
          username: ${{ steps.load_secret.outputs.IMAGE_REGISTRY_USERNAME }}
          password: ${{ steps.load_secret.outputs.IMAGE_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        id: build
        with:
          context: ${{ inputs.context }}
          tags: 
            - ${{ steps.load_secret.outputs.IMAGE_REGISTRY }}/${{ steps.load_secret.outputs.IMAGE_REGISTRY_USERNAME }}/${{ inputs.image_name }}:${{ inputs.tag }}
            - ${{ steps.load_secret.outputs.IMAGE_REGISTRY }}/${{ steps.load_secret.outputs.IMAGE_REGISTRY_USERNAME }}/${{ inputs.image_name }}:latest
            - ${{ steps.load_secret.outputs.IMAGE_REGISTRY }}/${{ steps.load_secret.outputs.IMAGE_REGISTRY_USERNAME }}/${{ inputs.image_name }}:${{ github.sha }}
          push: ${{ inputs.push }}
          build-args: ${{ inputs.build_args }}
          platforms: ${{ inputs.platforms }}

  # This step calls the container workflow to generate provenance and push it to
  # the container registry.
  provenance:
    needs: [build]
    permissions:
      actions: read # for detecting the Github Actions environment.
      id-token: write # for creating OIDC tokens for signing.
      packages: write # for uploading attestations.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ needs.build.outputs.image }}
      digest: ${{ needs.build.outputs.digest }}
      registry-username: ${{ needs.build.outputs.image_username }}
    secrets:
      registry-password: ${{ needs.build.outputs.image_password }}

  notify:
    needs: [build, provenance]
    runs-on: ${{ inputs.runs_on }}
    steps:
      - name: Load secrets
        id: load_secret
        uses: 1password/load-secrets-action@v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          NOTIFICATION_WEBHOOK: ${{ inputs.op_item_path_notification_webhook }}
      - name: Discord notification
        uses: "Ilshidur/action-discord@d2594079a10f1d6739ee50a2471f0ca57418b554"
        env:
          DISCORD_WEBHOOK: ${{ steps.load_secret.outputs.NOTIFICATION_WEBHOOK }}
        with:
          args: |
            {{ EVENT_PAYLOAD.repository.full_name }} has published Release: ${{github.ref_name}}
            Docker Image: `${{ needs.build.outputs.image }}`
            Digest: `${{ needs.build.outputs.digest }}`